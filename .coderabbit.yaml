# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: "auto"
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

chat:
  auto_reply: true

knowledge_base:
  opt_out: false

path_filters:
  - "!**/node_modules/**"
  - "!**/dist/**"
  - "!**/build/**"
  - "!**/.vite/**"
  - "!**/coverage/**"
  - "!**/*.min.*"
  - "!**/*.lock"
  - "!**/uv.lock"
  - "!**/*.png"
  - "!**/*.jpg"
  - "!**/*.jpeg"
  - "!**/*.gif"
  - "!**/*.webp"
  - "!**/*.svg"
  - "!**/*.ico"
  - "!**/*.pdf"
  - "!**/generated/**"

path_instructions:
  - path: "apps/web/**"
    instructions: |
      React frontend.
      Flag:
      - large components
      - business logic in UI
      - cross-feature coupling
      - unnecessary abstractions

  - path: "apps/desktop/**"
    instructions: |
      Electron layer.
      Flag:
      - business logic in Electron
      - unsafe preload usage
      - backend lifecycle issues

  - path: "backend/**"
    instructions: |
      Python backend.
      Flag:
      - fat route handlers
      - logic outside services
      - global state
      - oversized modules
      - fragile imports

  - path: "scripts/**"
    instructions: |
      Dev/build scripts only.
      Flag any product/business logic here.