# .coderabbit.yaml

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

chat:
  auto_reply: true

knowledge_base:
  opt_out: false

path_filters:
  - "!**/node_modules/**"
  - "!**/dist/**"
  - "!**/build/**"
  - "!**/.vite/**"
  - "!**/coverage/**"
  - "!**/*.min.*"
  - "!**/*.lock"
  - "!**/uv.lock"
  - "!**/*.png"
  - "!**/*.jpg"
  - "!**/*.jpeg"
  - "!**/*.gif"
  - "!**/*.webp"
  - "!**/*.svg"
  - "!**/*.ico"
  - "!**/*.pdf"
  - "!**/generated/**"

path_instructions:
  - path: "apps/web/**"
    instructions: |
      This is the React frontend.
      Focus review on:
      - feature boundaries
      - state management simplicity
      - avoiding business logic inside presentational components
      - avoiding unnecessary cross-feature coupling
      - maintainability for a solo developer
      Flag oversized components, duplicated UI logic, and unnecessary abstractions.

  - path: "apps/desktop/**"
    instructions: |
      This is the Electron layer.
      Focus review on:
      - lifecycle safety
      - minimal preload exposure
      - avoiding product business logic in Electron
      - safe backend process startup and shutdown
      - avoiding architecture drift between desktop and web/backend

  - path: "backend/**"
    instructions: |
      This is the Python backend.
      Focus review on:
      - thin route handlers
      - business logic in services
      - persistence isolated in store modules
      - integration boundaries
      - avoiding god modules, hidden globals, and oversized files
      - avoiding path-sensitive imports and startup fragility

  - path: "scripts/**"
    instructions: |
      These files are for development and build orchestration only.
      Flag business logic, product logic, or permanent runtime behavior being placed here.

  - path: "docs/**"
    instructions: |
      Review for clarity, consistency with current architecture, and whether the doc creates unnecessary process overhead for a solo developer.

early_access: false