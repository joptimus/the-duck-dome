<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/img/duckdome_icon.png" />
    <title>DuckDome</title>
    <style>
      /* --- App splash --- */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #060310;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #app-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .splash-logo {
        width: 600px;
        height: 600px;
        opacity: 0;
        transform: scale(0.8);
        animation: splash-logo-in 0.8s ease-out 0.25s forwards;
      }

      .splash-title {
        margin-top: 22px;
        font-size: 28px;
        letter-spacing: 0.18em;
        color: #ffdd44;
        text-transform: uppercase;
        font-weight: 700;
        opacity: 0;
        transform: translateY(10px);
        animation: splash-text-in 0.6s ease-out 0.75s forwards;
      }

      .splash-bar-track {
        margin-top: 34px;
        width: 220px;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
        opacity: 0;
        animation: splash-text-in 0.45s ease-out 1.1s forwards;
      }

      .splash-bar-fill {
        width: 0;
        height: 100%;
        background: linear-gradient(90deg, #ff8833, #ffdd44);
        border-radius: 2px;
        animation: splash-progress 2.8s ease-in-out 1.25s forwards;
      }

      @keyframes splash-logo-in {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes splash-text-in {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes splash-progress {
        0% { width: 0%; }
        20% { width: 16%; }
        50% { width: 48%; }
        80% { width: 82%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <img class="splash-logo" src="/img/splash_logo.png" alt="" />
      <div class="splash-title">THE DUCKDOME</div>
      <div class="splash-bar-track">
        <div class="splash-bar-fill"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
